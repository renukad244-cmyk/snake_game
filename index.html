<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        canvas {
            background: black;
            border: 2px solid gray;
            display: block;
            margin: 20px auto;
        }

        #score {
            font-size: 24px;
            margin: 10px;
        }

        #startBtn {
            padding: 10px 20px;
            font-size: 18px;
        }

        #controls {
            margin-top: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h2 id="score">Score: 0</h2>

<button id="startBtn" onclick="startGame()">Start Game</button>

<canvas id="game" width="400" height="400"></canvas>

<div id="controls">
    <div>
        <button class="control-btn" onclick="changeDirection('UP')">⬆️</button>
    </div>

    <div>
        <button class="control-btn" onclick="changeDirection('LEFT')">⬅️</button>
        <button class="control-btn" onclick="changeDirection('DOWN')">⬇️</button>
        <button class="control-btn" onclick="changeDirection('RIGHT')">➡️</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [];
let food = {};
let direction = "RIGHT";
let score = 0;
let gameLoop;

function startGame() {

    clearInterval(gameLoop);

    snake = [
        {x:200,y:200},
        {x:190,y:200},
        {x:180,y:200}
    ];

    direction = "RIGHT";
    score = 0;

    updateScore();
    createFood();

    draw();

    gameLoop = setInterval(moveSnake, 120);
}

function updateScore() {
    document.getElementById("score").innerText =
        "Score: " + score;
}

function createFood() {
    food = {
        x: Math.floor(Math.random() * 40) * 10,
        y: Math.floor(Math.random() * 40) * 10
    };
}

function draw() {

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle = "lime";

    snake.forEach(part => {
        ctx.fillRect(part.x, part.y, 10, 10);
    });

    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, 10, 10);
}

function moveSnake() {

    let head = {...snake[0]};

    if(direction === "UP") head.y -= 10;
    if(direction === "DOWN") head.y += 10;
    if(direction === "LEFT") head.x -= 10;
    if(direction === "RIGHT") head.x += 10;

    if(
        head.x < 0 ||
        head.x >= 400 ||
        head.y < 0 ||
        head.y >= 400
    ) {
        clearInterval(gameLoop);
        alert("Game Over! Score: " + score);
        return;
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y) {
        score++;
        updateScore();
        createFood();
    }
    else {
        snake.pop();
    }

    draw();
}

function changeDirection(dir) {

    if(dir === "UP" && direction !== "DOWN")
        direction = "UP";

    if(dir === "DOWN" && direction !== "UP")
        direction = "DOWN";

    if(dir === "LEFT" && direction !== "RIGHT")
        direction = "LEFT";

    if(dir === "RIGHT" && direction !== "LEFT")
        direction = "RIGHT";
}

document.addEventListener("keydown", function(e){

    if(e.key === "ArrowUp")
        changeDirection("UP");

    if(e.key === "ArrowDown")
        changeDirection("DOWN");

    if(e.key === "ArrowLeft")
        changeDirection("LEFT");

    if(e.key === "ArrowRight")
        changeDirection("RIGHT");
});
</script>

</body>
</html>
